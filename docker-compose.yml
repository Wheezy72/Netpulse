services:
  # ---------------------------------------------------------------------------
  # Core data stores
  # ---------------------------------------------------------------------------
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: netpulse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: netpulse
      POSTGRES_USER: netpulse
      POSTGRES_PASSWORD: netpulse
    # Port is intentionally NOT exposed externally - all app traffic goes via pgbouncer.
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netpulse -d netpulse"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Connection pooler – sits in front of Postgres, reduces connection overhead.
  pgbouncer:
    image: bitnamilegacy/pgbouncer:1.24.1
    container_name: netpulse-pgbouncer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRESQL_HOST: db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: netpulse
      POSTGRESQL_USERNAME: netpulse
      POSTGRESQL_PASSWORD: netpulse
      PGBOUNCER_DATABASE: netpulse
      PGBOUNCER_PORT: 5432
      PGBOUNCER_POOL_MODE: session
      PGBOUNCER_MAX_CLIENT_CONN: 200
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: netpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Message broker – RabbitMQ (used by the Rust probe for telemetry fan-out)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: netpulse-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: netpulse
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-netpulse}
      RABBITMQ_DEFAULT_VHOST: netpulse
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      network: host
    container_name: netpulse-app
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    user: "0"
    environment:
      DATABASE_URL: postgresql+asyncpg://netpulse:netpulse@pgbouncer:5432/netpulse
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://netpulse:${RABBITMQ_PASSWORD:-netpulse}@rabbitmq:5672/netpulse
      SECRET_KEY: ${SECRET_KEY:-super-secret-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-true}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@netpulse.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-changeme}
      PULSE_GATEWAY_IP: ${PULSE_GATEWAY_IP:-auto}
      PULSE_ISP_IP: ${PULSE_ISP_IP:-8.8.8.8}
      PULSE_CLOUDFLARE_IP: ${PULSE_CLOUDFLARE_IP:-1.1.1.1}
      SCRIPTS_BASE_DIR: /app/scripts
      PCAP_STORAGE_DIR: /app/data/pcaps
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-'["http://localhost:8000"]'}
    volumes:
      - app_data:/app/data
    ports:
      - "8000:8000"
    cap_add:
      - NET_RAW
      - NET_ADMIN

  celery_worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      network: host
    container_name: netpulse-worker
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    # --concurrency=4 caps parallelism; --max-tasks-per-child=100 recycles workers to prevent memory leaks.
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=4", "--max-tasks-per-child=100"]
    user: "0"
    environment:
      DATABASE_URL: postgresql+asyncpg://netpulse:netpulse@pgbouncer:5432/netpulse
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://netpulse:${RABBITMQ_PASSWORD:-netpulse}@rabbitmq:5672/netpulse
      SECRET_KEY: ${SECRET_KEY:-super-secret-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SCRIPTS_BASE_DIR: /app/scripts
      PCAP_STORAGE_DIR: /app/data/pcaps
    volumes:
      - app_data:/app/data
    cap_add:
      - NET_RAW
      - NET_ADMIN

  celery_beat:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      network: host
    container_name: netpulse-beat
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.core.celery_app.celery_app", "beat", "--loglevel=info"]
    user: "0"
    environment:
      DATABASE_URL: postgresql+asyncpg://netpulse:netpulse@pgbouncer:5432/netpulse
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-super-secret-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SCRIPTS_BASE_DIR: /app/scripts
      PCAP_STORAGE_DIR: /app/data/pcaps
    volumes:
      - app_data:/app/data

  # ---------------------------------------------------------------------------
  # Data-plane probe (Rust) – passive packet capture, HL7/DICOM BPF drop, telemetry fan-out
  # ---------------------------------------------------------------------------
  probe:
    build:
      context: ./probes
      dockerfile: Dockerfile
      network: host
    container_name: netpulse-probe
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    network_mode: host  # needs raw packet access
    environment:
      RABBITMQ_URL: amqp://netpulse:${RABBITMQ_PASSWORD:-netpulse}@localhost:5672/netpulse
      PROBE_IFACE: ${PROBE_IFACE:-eth0}
    cap_add:
      - NET_RAW
      - NET_ADMIN

volumes:
  db_data:
  app_data:
  rabbitmq_data:

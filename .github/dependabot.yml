version: 2

updates:
  # Track Docker base image updates (Dockerfile and docker-compose.yml).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/probes"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # Track GitHub Actions version updates.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

  # Track Go module dependency updates.
  - package-ecosystem: "gomod"
    directory: "/probes"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "go"

  # Track Python pip dependency updates.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"

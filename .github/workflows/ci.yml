name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Lint Python with ruff
  # ---------------------------------------------------------------------------
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/

  # ---------------------------------------------------------------------------
  # Python unit tests (no DB / Redis required)
  # ---------------------------------------------------------------------------
  test-python:
    name: Unit Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install fastapi httpx pydantic-settings pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Go probe: vet + unit tests
  # ---------------------------------------------------------------------------
  lint-test-go:
    name: Vet + Test Go (probe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install libpcap (required by gopacket/pcap)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: go vet
        working-directory: probes
        run: go vet ./...

      - name: go test
        working-directory: probes
        run: go test -v ./...

  # ---------------------------------------------------------------------------
  # Docker build smoke test — proves all Dockerfiles build cleanly.
  # Catches apt/package failures and broken URLs before they reach a real machine.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy env defaults
        run: cp .env.example .env

      - name: Build all images (no cache)
        run: docker compose build --no-cache
